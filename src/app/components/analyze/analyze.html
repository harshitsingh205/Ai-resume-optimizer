<!-- Resume Analysis Form -->
<div class="py-8 px-4 sm:px-6 lg:px-8">
  <form (submit)="onSubmit()" [formGroup]="form" enctype="multipart/form-data" class="max-w-2xl mx-auto bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-lg shadow-md border border-gray-200 dark:border-gray-700 transition-shadow hover:shadow-lg">
    <!-- Resume Upload -->
    <div class="mb-6">
      <label class="block mb-2 font-semibold text-gray-700 dark:text-gray-200">📄 Resume (PDF or DOCX)</label>
      <input type="file" (change)="onFileChange($event, 'resume')" class="w-full px-4 py-3 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 dark:bg-gray-700 dark:text-gray-100 hover:border-blue-400 transition-colors" />
    </div>

    <!-- JD Input Mode Toggle -->
    <div class="mb-6">
      <label class="block mb-3 font-semibold text-gray-700 dark:text-gray-200">📋 Job Description Input Method:</label>
      <div class="flex flex-wrap gap-4">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" [checked]="!useText()" (change)="toggleJDInput(false)" class="accent-blue-600" />
          <span class="text-gray-600 dark:text-gray-300">Upload File</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" [checked]="useText()" (change)="toggleJDInput(true)" class="accent-blue-600" />
          <span class="text-gray-600 dark:text-gray-300">Paste Text</span>
        </label>
      </div>
    </div>

  <!-- Conditional JD Input -->
    <div class="mb-6">
      @if (!useText()) {
        <input type="file" (change)="onFileChange($event, 'jd')" class="w-full px-4 py-3 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 dark:bg-gray-700 dark:text-gray-100 hover:border-blue-400 transition-colors" />       
      } @else {
        <textarea class="w-full h-40 border-2 border-gray-300 dark:border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 dark:bg-gray-700 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 resize-none" placeholder="Paste job description here..."
          formControlName="jdText"></textarea>
      }
    </div>
    <!-- Submit Button -->
    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 focus:from-blue-800 focus:to-blue-900 dark:from-blue-500 dark:to-blue-600 dark:hover:from-blue-600 dark:hover:to-blue-700 text-white font-semibold px-6 py-3 rounded-lg transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg" [disabled]="loading()"
      [class.opacity-50]="loading()">
      {{ loading() ? '⏳ Analyzing...' : '🚀 Analyze Resume' }}
    </button>
  </form>
</div>

<!-- Analysis Result -->
@if (result()) {
  <div class="px-4 sm:px-6 lg:px-8 pb-8">
    <div class="max-w-2xl mx-auto p-6 sm:p-8 bg-gradient-to-br from-green-50 to-blue-50 dark:from-gray-800 dark:to-gray-700 border-2 border-green-200 dark:border-green-900 rounded-lg shadow-lg text-gray-800 dark:text-gray-100 text-sm">
      <h2 class="text-lg font-bold mb-4 text-green-700 dark:text-green-400">✅ Analysis Complete</h2>
      <div class="prose prose-sm dark:prose-invert max-w-none">
        <markdown [data]="result()"></markdown>
      </div>
    </div>
  </div>
}
